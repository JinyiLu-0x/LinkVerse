
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkVerse</title>
    <link rel="icon" type="image/svg+xml" href="/mindgraph-tab.svg?v=4" />
    <link rel="shortcut icon" href="/mindgraph-tab.svg?v=4" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="LinkVerse is a relationship-first workspace for mapping notes, references, and product strategy with visual mind graphs."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              zinc: {
                950: '#09090b', // Custom deep dark for background
              }
            },
            animation: {
              'bounce-in': 'bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both',
            },
            keyframes: {
              'bounce-in': {
                '0%': { opacity: '0', transform: 'scale(0.3) translateY(20px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Ensure React Flow takes full height */
      html, body, #root {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      @keyframes auth-cursor-blink {
        0%, 49% {
          opacity: 1;
        }
        50%, 100% {
          opacity: 0;
        }
      }

      @keyframes auth-fade-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .auth-cursor {
        width: 0.62ch;
        height: 1.02em;
        margin-left: 0.02em;
        border-right: 1.5px solid currentColor;
        opacity: 1;
        flex-shrink: 0;
        transform: translateY(0.08em);
        animation: auth-cursor-blink 1.05s steps(1, end) infinite;
      }

      .auth-cursor--strong {
        border-right-width: 2px;
      }

      .auth-step {
        animation: auth-fade-up 0.35s ease both;
      }

      /* --- CRITICAL FIX: Clean Gray Edges --- */
      /* Reverted to Gray (Zinc) for cleaner look, straight lines */
      .react-flow__edge-path {
        stroke: #a1a1aa !important; /* Zinc-400 - Visible but subtle gray */
        stroke-width: 1px !important; /* Thinner for cleaner look */
        opacity: 0.6 !important;
        fill: none !important;
      }
      /* Light mode override to make it slightly darker */
      html:not(.dark) .react-flow__edge-path {
        stroke: #71717a !important; /* Zinc-500 */
        opacity: 0.5 !important;
      }
      
      /* Ensure connection line (while dragging) matches */
      .react-flow__connection-path {
        stroke: #71717a !important;
        stroke-width: 1px !important;
        stroke-dasharray: 5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
