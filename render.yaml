services:
  - type: web
    name: linkverse
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: VITE_AI_API_KEY
        sync: false
      - key: VITE_AI_MODEL
        value: gemini-2.5-flash
